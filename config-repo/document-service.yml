server:
  port: 8084

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/document_service_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # MinIO
  minio:
    url: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin

  servlet:
    multipart:
      enabled: true

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html

management:
  tracing:
    enabled: false
