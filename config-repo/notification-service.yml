server:
  port: 8083

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_service_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

management:
  tracing:
    enabled: true