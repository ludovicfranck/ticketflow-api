services:
  postgres:
    image: postgres:15
    container_name: ticketflow-postgres
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ] # On teste avec admin
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # le script d'initialisation ici
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    networks:
      - ticketflow-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.1.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

    ports:
      - "8180:8080"
    command: start-dev
    networks:
      - ticketflow-net
    volumes:
      - keycloak_data:/opt/keycloak/data # Ajoute ceci
       #keycloak_data:/opt/keycloak/data


  minio:
    image: minio/minio
    container_name: ticketflow-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: server /data --console-address ":9001"
    networks:
      - ticketflow-net
    volumes:
      - minio_data:/data
#  service mini io qui va permettre de creer un bucket au lancement du container Docker puis en cas de creation procede par l'affichage d'un message Bucket cree avec succes dans la console
  minio-init:
    image: minio/mc:latest
    container_name: ticketflow-minio-init
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing minio/ticketflow-bucket;   
      mc anonymous set public minio/ticketflow-bucket;
      echo 'Bucket créé avec succes';    
      "
    networks:
      - ticketflow-net

#    -- pour la tracabilite inter-services
  zipkin:
    image: openzipkin/zipkin
    ports:
      - "9411:9411"
#  -- pour le monitoring et la surveillance | observabilite

  prometheus:
    image: prom/prometheus
    container_name: ticketflow-prometheus
    ports:
      - "9090:9090"
    networks:
      - ticketflow-net

#   Kafka --------------

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: ticketflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ticketflow-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: ticketflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # On définit deux canaux : un pour l'extérieur (localhost) et un pour Docker (kafka)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck: # pour que les microservices démarrent
      test: [ "CMD", "kafka-topics" , "--bootstrap-server" , "localhost:9092" , "--list" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - ticketflow-net
#  pour la visualisation d'evennement
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ticketflow-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: ticketflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka
    networks:
      - ticketflow-net

#  eureka-server
  eureka-server:
    build: ./eureka-server
    container_name: ticketflow-eureka
    ports:
      - "8761:8761"
    networks:
      - ticketflow-net

# config-server
  config-server:
    build: ./config-server
    container_name: ticketflow-config
    ports:
      - "8888:8888"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
    networks:
      - ticketflow-net

#  ---- user-service
  user-service:
    build: ./user-service
    container_name: ticketflow-user-service
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/user_service_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_AUTH_SERVER_URL: http://keycloak:8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ticketflow-net
# -----ticket-service
  ticket-service:
    build: ./ticket-service
    container_name: ticketflow-ticket-service
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/ticket_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
    networks:
      - ticketflow-net
# notification service
  notification-service:
    build: ./notification-service
    container_name: ticketflow-notification-service
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/notification_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ticketflow-net

# document service
  document-service:
    build: ./document-service
    container_name: ticketflow-document-service
    ports:
      - "8084:8084"
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/document_service_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - ticketflow-net

# api-gateway
  api-gateway:
    build: ./api-gateway
    container_name: ticketflow-gateway
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_AUTH_SERVER_URL: http://keycloak:8080
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: optional:configserver:http://config-server:8888/
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_started
      ticket-service:
        condition: service_started
    networks:
      - ticketflow-net
networks:
  ticketflow-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  keycloak_data: